<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <script>try{var _t=localStorage.getItem('neom.theme');if(_t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — Neom studio</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body dir="rtl">
  <div class="ambient" aria-hidden="true"><span></span><span></span><span></span></div>

  <div id="nav-mount"></div>

  <main>
    <section class="auth-shell">
      <form class="auth-card card reveal" id="loginForm" novalidate>
        <div class="auth-head">
          <img class="logo-badge" src="assets/img/logo.svg" alt="Neom studio" />
          <h1>تسجيل الدخول</h1>
          <p>أهلاً بعودتك! ادخل بياناتك للمتابعة إلى حسابك.</p>
        </div>

        <div class="field" style="position:relative">
          <label for="logAccount">البريد الإلكتروني</label>
          <div class="input-wrap">
            <input class="input" id="logAccount" type="email" autocomplete="email" placeholder="you@example.com" />
            <span class="i-ico" data-icon="mail"></span>
          </div>
          <div class="suggest" id="logSuggest"></div>
          <small class="err">ادخل بريدك الإلكتروني</small>
        </div>

        <div class="field">
          <label for="logPass">كلمة المرور</label>
          <div class="input-wrap">
            <input class="input" id="logPass" type="password" placeholder="••••••••" />
            <span class="i-ico" data-icon="lock"></span>
          </div>
          <small class="err">أدخل كلمة المرور</small>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap">
          <label class="checkbox"><input type="checkbox" id="logRemember" /> تذكّرني</label>
          <a href="#" id="logForgot" style="color:var(--c-turquoise);font-size:.86rem;font-weight:600">نسيت كلمة المرور؟</a>
        </div>

        <button class="btn btn-primary btn-block" type="submit">
          <span data-icon="login"></span><span data-i18n="btn.login">تسجيل دخول</span>
        </button>

        <p class="auth-foot">ليس لديك حساب؟ <a href="register.html" data-i18n="btn.register">صنع حساب جديد</a></p>
      </form>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/data/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
