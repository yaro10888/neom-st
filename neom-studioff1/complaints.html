<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <script>try{var _t=localStorage.getItem('neom.theme');if(_t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الشكاوى و الاقتراحات — Neom studio</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
</head>
<body dir="rtl">
  <div class="ambient" aria-hidden="true"><span></span><span></span><span></span></div>

  <div id="nav-mount"></div>

  <main>
    <header class="page-head">
      <div class="page-head-inner reveal">
        <nav class="breadcrumb" aria-label="breadcrumb">
          <a href="index.html" data-i18n="nav.home">الرئيسية</a>
          <span class="sep">/</span>
          <span data-i18n="nav.complaints">الشكوى و الاقتراحات</span>
          <span class="route">/complaints</span>
        </nav>
        <h1 data-i18n="h.complaints.t">الشكاوى و الاقتراحات</h1>
        <p data-i18n="h.complaints.d">رأيك يهمنا، أرسل شكوى أو اقتراحًا وسنراجعه في أقرب وقت.</p>
      </div>
    </header>

    <section class="container" style="margin-top:26px">
      <form class="auth-card card reveal" id="complaintForm" style="margin-inline:auto" novalidate>
        <div class="field">
          <label for="cType">نوع الرسالة</label>
          <select class="select" id="cType">
            <option value="">اختر النوع…</option>
            <option value="complaint">شكوى</option>
            <option value="suggestion">اقتراح</option>
            <option value="bug">الإبلاغ عن مشكلة</option>
            <option value="other">أخرى</option>
          </select>
          <small class="err">اختر النوع</small>
        </div>

        <div class="field">
          <label for="cTitle">العنوان</label>
          <div class="input-wrap">
            <input class="input" id="cTitle" type="text" placeholder="عنوان مختصر لرسالتك" />
            <span class="i-ico" data-icon="edit"></span>
          </div>
          <small class="err">العنوان مطلوب</small>
        </div>

        <div class="field">
          <label for="cDesc">التفاصيل</label>
          <textarea class="textarea" id="cDesc" maxlength="800" placeholder="اشرح شكواك أو اقتراحك بالتفصيل…"></textarea>
          <div class="char-count">0 / 800</div>
          <small class="err">اكتب 15 حرفًا على الأقل</small>
        </div>

        <div class="field">
          <label for="cWhatsapp">رقم الواتساب <span style="color:var(--tx-muted);font-weight:400">(اختياري — للرد عليك)</span></label>
          <div class="input-wrap">
            <input class="input" id="cWhatsapp" type="tel" inputmode="tel" placeholder="+20 1XX XXX XXXX" />
            <span class="i-ico" data-icon="whatsapp"></span>
          </div>
          <small class="err">رقم واتساب غير صحيح</small>
        </div>

        <button class="btn btn-primary btn-block" type="submit">
          <span data-icon="inbox"></span><span data-i18n="btn.sendComplaint">إرسال شكوى</span>
        </button>
        <p class="auth-foot">جميع الرسائل تُراجَع من قبل فريق الإدارة، شكرًا لمساهمتك في تحسين الاستديو.</p>
      </form>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/data/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/forms.js"></script>
</body>
</html>
