<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neom Studio neon city scene" class="hero-scene">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#5b6ee0"/>
      <stop offset="42%" stop-color="#4a55b8"/>
      <stop offset="100%" stop-color="#2a2f66"/>
    </radialGradient>
    <linearGradient id="bldgTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b3a5a"/>
      <stop offset="1" stop-color="#11233f"/>
    </linearGradient>
    <linearGradient id="bldgPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#352a6b"/>
      <stop offset="1" stop-color="#241b4d"/>
    </linearGradient>
    <linearGradient id="temple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2bc8d8"/>
      <stop offset="55%" stop-color="#3a86d8"/>
      <stop offset="100%" stop-color="#6b5bd0"/>
    </linearGradient>
    <linearGradient id="portal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9af0ff"/>
      <stop offset="50%" stop-color="#56d0f0"/>
      <stop offset="100%" stop-color="#8f7bf0"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4f7a"/>
      <stop offset="100%" stop-color="#1a2342"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fd6c0"/>
      <stop offset="100%" stop-color="#2f9bb0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ad0e8" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#56b8f0" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <linearGradient id="emblem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eafffb"/>
      <stop offset="1" stop-color="#d6ccff"/>
    </linearGradient>
  </defs>

  <!-- atmosphere -->
  <rect width="1000" height="720" fill="url(#sky)"/>
  <g class="layer-bg">
    <circle cx="250" cy="220" r="150" fill="#6b8bff" opacity="0.25" filter="url(#soft)"/>
    <circle cx="760" cy="180" r="170" fill="#a06bff" opacity="0.22" filter="url(#soft)"/>
    <circle cx="500" cy="300" r="220" fill="#3ad8e0" opacity="0.16" filter="url(#soft)"/>
    <!-- stars -->
    <g fill="#dbe8ff">
      <circle cx="120" cy="90" r="1.6"/><circle cx="300" cy="60" r="1.2"/><circle cx="430" cy="110" r="1.5"/>
      <circle cx="620" cy="70" r="1.3"/><circle cx="820" cy="120" r="1.6"/><circle cx="900" cy="60" r="1.2"/>
      <circle cx="70" cy="200" r="1.2"/><circle cx="930" cy="240" r="1.4"/><circle cx="180" cy="150" r="1.1"/>
    </g>
  </g>

  <!-- distant skyline -->
  <g class="layer-mid">
    <!-- left cluster -->
    <g>
      <rect x="120" y="230" width="58" height="240" rx="6" fill="url(#bldgPurple)"/>
      <rect x="120" y="230" width="58" height="240" rx="6" fill="none" stroke="#7b6bff" stroke-width="1.4" opacity="0.7" filter="url(#neon)"/>
      <rect x="186" y="280" width="46" height="190" rx="6" fill="url(#bldgTeal)"/>
      <rect x="186" y="280" width="46" height="190" rx="6" fill="none" stroke="#39d8e8" stroke-width="1.4" opacity="0.7" filter="url(#neon)"/>
      <rect x="86" y="300" width="40" height="170" rx="6" fill="url(#bldgTeal)"/>
      <rect x="86" y="300" width="40" height="170" rx="6" fill="none" stroke="#39d8e8" stroke-width="1.2" opacity="0.6" filter="url(#neon)"/>
    </g>
    <!-- right cluster -->
    <g>
      <rect x="788" y="240" width="60" height="230" rx="6" fill="url(#bldgTeal)"/>
      <rect x="788" y="240" width="60" height="230" rx="6" fill="none" stroke="#39d8e8" stroke-width="1.4" opacity="0.7" filter="url(#neon)"/>
      <rect x="852" y="290" width="46" height="180" rx="6" fill="url(#bldgPurple)"/>
      <rect x="852" y="290" width="46" height="180" rx="6" fill="none" stroke="#7b6bff" stroke-width="1.4" opacity="0.7" filter="url(#neon)"/>
      <rect x="742" y="300" width="42" height="170" rx="6" fill="url(#bldgPurple)"/>
      <rect x="742" y="300" width="42" height="170" rx="6" fill="none" stroke="#7b6bff" stroke-width="1.2" opacity="0.6" filter="url(#neon)"/>
    </g>
    <!-- lit windows -->
    <g fill="#bfeeff" opacity="0.85">
      <rect x="132" y="250" width="6" height="6" rx="1"/><rect x="150" y="250" width="6" height="6" rx="1"/>
      <rect x="132" y="280" width="6" height="6" rx="1"/><rect x="160" y="300" width="6" height="6" rx="1"/>
      <rect x="196" y="300" width="6" height="6" rx="1"/><rect x="214" y="330" width="6" height="6" rx="1"/>
      <rect x="800" y="262" width="6" height="6" rx="1"/><rect x="820" y="262" width="6" height="6" rx="1"/>
      <rect x="800" y="300" width="6" height="6" rx="1"/><rect x="862" y="312" width="6" height="6" rx="1"/>
    </g>
  </g>

  <!-- floating island + temple (front layer) -->
  <g class="layer-fg">
    <!-- island base -->
    <path d="M 300 520 L 700 520 L 640 600 Q 500 660 360 600 Z" fill="url(#rock)"/>
    <path d="M 300 520 L 700 520 L 690 542 Q 500 590 310 542 Z" fill="url(#grass)"/>
    <path d="M 360 600 Q 500 660 640 600 L 560 700 Q 500 720 440 700 Z" fill="#16203c"/>

    <!-- temple platform -->
    <rect x="402" y="470" width="196" height="58" rx="8" fill="url(#bldgTeal)"/>
    <rect x="402" y="470" width="196" height="58" rx="8" fill="none" stroke="#3ad8e8" stroke-width="1.6" opacity="0.8" filter="url(#neon)"/>

    <!-- main temple body -->
    <rect x="430" y="300" width="140" height="172" rx="10" fill="url(#temple)" opacity="0.9"/>
    <rect x="430" y="300" width="140" height="172" rx="10" fill="none" stroke="#aef0ff" stroke-width="1.6" opacity="0.85" filter="url(#neon)"/>

    <!-- side wings -->
    <rect x="372" y="360" width="58" height="112" rx="8" fill="url(#temple)" opacity="0.8"/>
    <rect x="372" y="360" width="58" height="112" rx="8" fill="none" stroke="#7be0f0" stroke-width="1.3" opacity="0.7" filter="url(#neon)"/>
    <rect x="570" y="360" width="58" height="112" rx="8" fill="url(#temple)" opacity="0.8"/>
    <rect x="570" y="360" width="58" height="112" rx="8" fill="none" stroke="#7be0f0" stroke-width="1.3" opacity="0.7" filter="url(#neon)"/>

    <!-- glowing portal/door -->
    <rect x="470" y="356" width="60" height="116" rx="30" fill="url(#portal)" opacity="0.95" filter="url(#neon)"/>
    <rect x="478" y="366" width="44" height="100" rx="22" fill="#0c1430" opacity="0.55"/>

    <!-- emblem on the temple -->
    <g transform="translate(500 330) scale(0.42)" filter="url(#neon)">
      <g fill="url(#emblem)">
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(45)"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(90)"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(135)"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(180)"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(225)"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(270)"/>
        <path d="M0 -44 C7 -44 12 -32 12 -14 C12 -1 7 6 0 6 C-7 6 -12 -1 -12 -14 C-12 -32 -7 -44 0 -44 Z" transform="rotate(315)"/>
      </g>
      <circle r="9" fill="#fff"/>
    </g>

    <!-- palms -->
    <g stroke="#39e0c0" stroke-width="3.4" fill="none" stroke-linecap="round" filter="url(#neon)" opacity="0.92">
      <path d="M345 520 q -4 -40 -2 -62"/>
      <path d="M343 460 q -22 -14 -40 -10 M343 460 q -8 -22 -2 -42 M343 460 q 20 -12 36 -6 M343 460 q -26 4 -38 18"/>
      <path d="M655 520 q 4 -40 2 -62"/>
      <path d="M657 460 q 22 -14 40 -10 M657 460 q 8 -22 2 -42 M657 460 q -20 -12 -36 -6 M657 460 q 26 4 38 18"/>
    </g>

    <!-- path lights -->
    <g fill="#9af0ff" filter="url(#neon)">
      <circle cx="470" cy="510" r="3"/><circle cx="500" cy="516" r="3"/><circle cx="530" cy="510" r="3"/>
    </g>

    <!-- water reflection -->
    <ellipse cx="500" cy="690" rx="230" ry="22" fill="url(#water)"/>
  </g>
</svg>
