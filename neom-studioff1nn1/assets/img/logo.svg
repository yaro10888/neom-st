<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neom studio">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eafffb"/>
      <stop offset="0.5" stop-color="#bdeef0"/>
      <stop offset="1" stop-color="#d8d2ff"/>
    </linearGradient>
    <filter id="logoGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 8 rounded petals forming a star/flower, built by rotating one rounded blade -->
  <g filter="url(#logoGlow)" fill="url(#logoGrad)">
    <g>
      <path d="M60 8
               C66 8 71 18 71 34
               C71 46 66 52 60 52
               C54 52 49 46 49 34
               C49 18 54 8 60 8 Z"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(45 60 60)"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(90 60 60)"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(135 60 60)"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(180 60 60)"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(225 60 60)"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(270 60 60)"/>
      <path d="M60 8 C66 8 71 18 71 34 C71 46 66 52 60 52 C54 52 49 46 49 34 C49 18 54 8 60 8 Z" transform="rotate(315 60 60)"/>
    </g>
    <circle cx="60" cy="60" r="9" fill="#ffffff"/>
  </g>
</svg>
