<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <script>try{var _t=localStorage.getItem('neom.theme');if(_t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة — Neom studio</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />

          <span style="text-align:start;line-height:1.25">
            <b id="adminWhoName" style="display:block;font-size:.9rem;color:var(--tx-1)">—</b>
            <span id="adminWhoRole" style="font-size:.74rem;color:var(--tx-muted)">—</span>

          <img id="adminWhoAvatar" src="assets/img/avatars/avatar-01.svg" alt="المسؤول" />

      </div>

      <div id="adminContent"></div>
